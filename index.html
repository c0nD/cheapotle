<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheapotle — Food Ordering Service</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 40px 20px;
        }
        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e53e3e, #dd6b20);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .tagline {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-bottom: 40px;
        }
        .desc {
            font-size: 1rem;
            color: #ccc;
            line-height: 1.7;
            margin-bottom: 40px;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: linear-gradient(135deg, #e53e3e, #dd6b20);
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.85; }
        .footer {
            margin-top: 60px;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Cheapotle</div>
        <div class="tagline">Food ordering made simple.</div>
        <p class="desc">
            We provide an online food ordering and pickup coordination service.
            Place your order through our platform, pay securely, and pick up
            your meal at your local restaurant — fresh, fast, and affordable.
        </p>
        <a href="https://discord.gg/cVvZpvjZJD" class="btn">Join Our Discord</a>
        <div class="footer">
            <p>contact@cheapotle.com</p>
        </div>
    </div>
</body>
</html>
